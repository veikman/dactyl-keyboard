# Configuration fragment for magnet pockets, which are holes for magnets to
# hold assortment drawers in place in a Concertina.
#
# Settings here are for cylindrical magnets of actual radius 5 mm, height 2.5
# mm. The magnets are simply centred in each 4 mm shelf, which is suitable for
# small printer nozzles.

tweaks:
  inner-magnet-pockets:
  - above-ground: true
    cut: true
    reflect: true
    hull-around:
    - [assortment1, SE, 2, &inner-pocket {anchoring: {intrinsic-offset: [-5, -2, 4]}, size: &pocket-size [10, 2.5, 10.5]}]
    - [assortment1, SE, 2, &inner-channel {anchoring: {intrinsic-offset: [-12, -2, 4]}, size: &channel-size [1, 2.5, 1]}]
  - above-ground: true
    cut: true
    reflect: true
    hull-around:
    - [assortment2, SE, 2, *inner-pocket]
    - [assortment2, SE, 2, *inner-channel]
  - above-ground: true
    cut: true
    reflect: true
    hull-around:
    - [assortment3, SE, 2, *inner-pocket]
    - [assortment3, SE, 2, *inner-channel]
  # The same sort of pockets but at the front of each drawer, to keep it steady while open.
  outer-magnet-pockets:
  - above-ground: true
    cut: true
    reflect: true
    hull-around:
    - [assortment1, SE, 0, &outer-pocket {anchoring: {intrinsic-offset: [-5, -2, -15]}, size: *pocket-size}]
    - [assortment1, SE, 0, &outer-channel {anchoring: {intrinsic-offset: [-12, -2, -15]}, size: *channel-size}]
  - above-ground: true
    cut: true
    reflect: true
    hull-around:
    - [assortment2, SE, 0, *outer-pocket]
    - [assortment2, SE, 0, *outer-channel]
  - above-ground: true
    cut: true
    reflect: true
    hull-around:
    - [assortment3, SE, 0, *outer-pocket]
    - [assortment3, SE, 0, *outer-channel]
